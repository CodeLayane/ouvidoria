    <script>
       
        function getUrlParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            var results = regex.exec(location.search);
            return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
        };

       
        document.addEventListener('DOMContentLoaded', function () {
            var successMessage = getUrlParameter('sucesso');
            var errorMessage = getUrlParameter('erro');

            if (successMessage) {
                alert('Sucesso: ' + successMessage);
            }

            if (errorMessage) {
                alert('Erro: ' + errorMessage);
            }
        });

       
        const checkboxAnonimo = document.getElementById('anonimo');
        const camposIdentificacao = document.getElementById('campos-identificacao');
        const camposObrigatorios = camposIdentificacao.querySelectorAll('input');

        checkboxAnonimo.addEventListener('change', function () {
            if (this.checked) {
                camposIdentificacao.style.display = 'none';
                camposObrigatorios.forEach(campo => {
                    campo.removeAttribute('required');
                });
            } else {
                camposIdentificacao.style.display = 'block';
                camposObrigatorios.forEach(campo => {
                    campo.setAttribute('required', 'required');
                });
            }
        });

        
        const inputImagem = document.getElementById('imagem');
        const previewImagem = document.getElementById('preview-imagem');
        const fileName = document.getElementById('fileName');
        const btnGaleria = document.getElementById('btnGaleria');

        
        btnGaleria.addEventListener('click', function (e) {
            e.preventDefault();
            inputImagem.click();
        });

       
        inputImagem.addEventListener('change', function (event) {
            const arquivo = event.target.files[0];

            if (arquivo) {
               
                if (arquivo.size > 60 * 1024 * 1024) {
                    alert('O arquivo deve ter no máximo 60MB.');
                    event.target.value = ''; 
                    previewImagem.style.display = 'none';
                    fileName.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Nenhum arquivo selecionado';
                    return;
                }

                const leitor = new FileReader();

                leitor.onload = function (e) {
                    previewImagem.src = e.target.result;
                    previewImagem.style.display = 'block';
                    fileName.innerHTML = `<i class="fas fa-image"></i> ${arquivo.name}`;
                }

                leitor.readAsDataURL(arquivo);
            } else {
                previewImagem.style.display = 'none';
                fileName.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Nenhum arquivo selecionado';
            }
        });
    </script>
